#!/bin/sh
#
# Variables
#
DEVICE_NAME="DirectLan"
DEFAULT_FILE="/etc/default/rcPGenerator"
DHCP_CONF_FILE="/etc/dhcp/dhcpd.conf"
PID_FILE="/var/run/dhcpd-DirectLan.pid"
LEASE_FILE="/var/lib/dhcp/dhcpd-DirectLan.leases"
PROGRAM_DAEMON="/sbin/dhcpd -cf $DHCP_CONF_FILE -pf $PID_FILE -lf $LEASE_FILE $DEVICE_NAME"
DIRECT_NET="10.10.13"
. $DEFAULT_FILE

#
# UP
#
if [ "$ifcarrier" == "up" ] &&  [ "$reason" == "IPV4LL" ];then
 ip link add $DEVICE_NAME link eth0 type ipvlan mode l2 bridge
 ifconfig $DEVICE_NAME $DIRECT_NET".1" netmask 255.255.255.0 up
 # Ensure lease file exists for dhcpd
 touch $LEASE_FILE
 $PROGRAM_DAEMON
 # Remove broken default route via eth0 link-local (belt-and-suspenders;
 # dhcpcd -G should prevent it, but clean up in case)
 ip route del default dev eth0 2>/dev/null
fi

#
# DOWN
#
if [ "$ifcarrier" == "down" ] &&  [ "$reason" == "NOCARRIER" ];then
 pkill -9 -f $PID_FILE
 ip link del $DEVICE_NAME
fi
