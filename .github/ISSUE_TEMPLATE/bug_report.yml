name: "Bug report"
description: "Report a problem with PGenerator Plus"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please fill out the details below so the problem can be reproduced quickly.

  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      description: "Please confirm the following."
      options:
        - label: "I searched existing issues and did not find a duplicate"
          required: true

  - type: input
    id: version
    attributes:
      label: "PGenerator version"
      description: "Example: 2.2.2"
      placeholder: "2.2.2"
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: "Install method"
      options:
        - "Fresh image install"
        - "OTA update"
        - "Updated from an older version"
        - "Built from source"
        - "Something else"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: "Hardware used"
      description: "Raspberry Pi model, display, adapter, or signal chain"
      placeholder: "Raspberry Pi 4B, LG C2, HDMI direct"
    validations:
      required: true

  - type: input
    id: meter
    attributes:
      label: "Meter"
      placeholder: "i1Display Pro Plus"

  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      options:
        - "Web UI"
        - "Pattern output"
        - "Meter detection or readings"
        - "OTA update"
        - "Network discovery or control"
        - "HDR, HLG, or Dolby Vision"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: "Current behavior"
      placeholder: "Describe the bug clearly."
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected behavior"
      placeholder: "What should have happened instead?"
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. Open ...
        2. Change ...
        3. Start ...
        4. Observe the issue ...
    validations:
      required: true

  - type: textarea
    id: relevant_logs
    attributes:
      label: "Relevant log output"
      description: "Paste console output, API responses, or extra notes here."
      render: shell
